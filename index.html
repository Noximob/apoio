<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nox Imóveis · Portfólio Imobiliário</title>
<meta name="description" content="Nox Imóveis — ferramenta de apresentação de produtos imobiliários para corretores.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#0a1622; --bg2:#0c1a2b; --bg3:#0e1f33; --bg4:#10243a; --panel:#16283f;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --txt:#e8eef6; --txt2:#cdd9e6; --txt3:#9fb4cc; --txt4:#7e95ad; --txt5:#5d7790;
  --accent:#9a6cf0; --ok:#5dcaa5; --warn:#e0a23a; --danger:#f0716b;
  --SANTER:#4a9eff; --ROTTAS:#f0997b; --STEIN:#b39af0; --TORRES:#5dcaa5;
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:radial-gradient(1200px 700px at 80% -10%,#13263d 0%,var(--bg) 55%);
  color:var(--txt); -webkit-font-smoothing:antialiased; overflow:hidden;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select,textarea{font-family:inherit}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.28)}
::-webkit-scrollbar-track{background:transparent}

/* ---------- Shell ---------- */
#shell{display:flex;flex-direction:column;height:100vh;height:100dvh}
#topbar{
  display:flex;align-items:center;gap:14px;padding:12px 18px;
  border-bottom:1px solid var(--line);background:rgba(8,18,30,.6);backdrop-filter:blur(8px);flex:none;
}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#a78bfa,#7c3aed);
  display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 6px 18px rgba(124,58,237,.4)}
.brand .logo i{font-size:19px;color:#fff}
.brand h1{font-size:15px;font-weight:600;margin:0;letter-spacing:.2px;white-space:nowrap}
.brand h1 b{color:var(--accent);font-weight:700}
.brand .sub{font-size:10px;color:var(--txt5);letter-spacing:1.5px;margin-top:1px}
#topbar .spacer{flex:1}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;color:var(--txt3);transition:.15s;flex:none}
.icon-btn:hover{background:var(--bg4);color:var(--txt);border-color:var(--line2)}
.icon-btn i{font-size:19px}

#app{flex:1;display:flex;min-height:0;position:relative}
#sideToggle{display:flex}

/* ---------- Sidebar (sempre como gaveta / hambúrguer) ---------- */
#side{position:fixed;top:57px;left:0;bottom:0;width:300px;max-width:86vw;z-index:120;
  background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;display:flex;flex-direction:column;
  transform:translateX(-100%);transition:transform .25s;box-shadow:8px 0 50px rgba(0,0,0,.5)}
#side.open{transform:none}
#scrim{position:fixed;top:57px;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:115;display:none}
#scrim.show{display:block}
.side-head{padding:16px 16px 10px}
.search{display:flex;align-items:center;gap:8px;background:var(--bg4);border:1px solid var(--line);
  border-radius:10px;padding:8px 11px;margin-bottom:12px}
.search i{font-size:16px;color:var(--txt4)}
.search input{border:none;background:none;color:var(--txt);font-size:13px;width:100%;outline:none}
.search input::placeholder{color:var(--txt5)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{cursor:pointer;font-size:10px;letter-spacing:.5px;padding:5px 11px;border-radius:20px;
  border:1px solid var(--line2);background:transparent;transition:.14s}
.count{font-size:9px;letter-spacing:1px;color:var(--txt5);padding:10px 16px 6px}
.rows{border-top:1px solid var(--line);flex:1}
.row{cursor:pointer;display:flex;gap:11px;padding:12px 14px;border-left:2px solid transparent;transition:.12s;position:relative}
.row:hover{background:rgba(255,255,255,.04)}
.row.sel{background:rgba(74,158,255,.10)}
.row .thumb{width:42px;height:42px;flex:none;border-radius:9px;background:var(--panel);
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.row .thumb img{width:100%;height:100%;object-fit:cover}
.row .thumb i{font-size:20px;color:#6f8aa8}
.row .meta{min-width:0;flex:1}
.row .meta .nm{font-size:13px;font-weight:500;color:var(--txt);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta .ci{font-size:10.5px;color:var(--txt4);margin:2px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta .pr{font-size:11px;margin:3px 0 0;font-weight:500}
.empty-side{padding:30px 18px;text-align:center;color:var(--txt4);font-size:12px;line-height:1.6}

/* ---------- Main ---------- */
#main{flex:1;overflow-y:auto;min-width:0;background:var(--bg)}
#main:fullscreen{background:var(--bg)}
#main .hero{animation:fadeUp .4s ease both}
#main .stats{animation:fadeUp .4s ease both;animation-delay:.05s}
#main .body{animation:fadeUp .4s ease both;animation-delay:.1s}
.vfade{animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.hero{position:relative;min-height:200px;display:flex;flex-direction:column;justify-content:flex-end;
  padding:20px 26px;background:var(--panel);overflow:hidden}
.hero .heroimg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.62);transform:scale(1.04);transition:transform 6s ease}
.hero:hover .heroimg{transform:scale(1.1)}
.hero .heroph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 120% at 70% 0%,color-mix(in srgb,var(--brand,#4a9eff) 18%,transparent),transparent 60%)}
.hero .heroph i{font-size:62px;color:rgba(255,255,255,.12)}
.hero .grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,16,28,.05) 0%,rgba(8,16,28,.35) 45%,rgba(8,16,28,.92) 100%),linear-gradient(90deg,rgba(8,16,28,.55),transparent 55%)}
.hero .info{position:relative;z-index:2}
.badge{display:inline-block;font-size:9px;letter-spacing:1px;color:#0a1622;padding:3px 10px;border-radius:6px;margin-bottom:8px;font-weight:600}
.hero .co{font-size:11px;letter-spacing:1.5px;margin:0;font-weight:600}
.hero .nm{font-size:25px;font-weight:600;color:#fff;margin:2px 0 0}
.hero .li{font-size:12px;font-style:italic;color:var(--txt3);margin:3px 0 0}
.hero .loc{font-size:11.5px;color:#8aa0b8;margin:6px 0 0}
.hero .loc i{font-size:13px;vertical-align:-2px}

.stats{display:flex;background:var(--bg3);border-bottom:1px solid var(--line)}
.stat{flex:1;text-align:center;padding:14px 4px;border-right:1px solid var(--line);transition:background .15s}
.stat:last-child{border-right:none}
.stat:hover{background:var(--bg4)}
.stat .v{font-size:18px;font-weight:600;color:var(--brand,var(--accent));margin:0}
.stat .l{font-size:9px;letter-spacing:1px;color:var(--txt4);margin:3px 0 0}

.body{padding:18px 26px 40px}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.pill{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:22px;
  background:var(--bg4);border:1px solid var(--line);transition:.16s;font-size:12.5px;color:var(--txt);position:relative}
.pill:hover{border-color:var(--line2);transform:translateY(-1px)}
.pill.on{background:var(--brand,var(--accent));border-color:var(--brand,var(--accent));color:#0a1622;font-weight:600;box-shadow:0 8px 22px rgba(0,0,0,.28)}
.pill i{font-size:16px}
.pill .dot{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 3px;border-radius:8px;
  background:var(--brand,var(--accent));color:#0a1622;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.pill.on .dot{background:#0a1622;color:var(--brand,var(--accent));border-color:var(--brand,var(--accent))}

/* content blocks */
.lead{font-size:13.5px;line-height:1.7;color:var(--txt2);margin:0 0 20px;white-space:pre-wrap}
.section-label{font-size:10px;letter-spacing:1.2px;color:#6f88a3;margin:0 0 10px}
.tip-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:22px}
.tip{background:var(--bg4);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
.tip .a{font-size:17px;font-weight:600;color:#fff;margin:0}
.tip .a small{font-size:10px;color:var(--txt4);font-weight:400}
.tip .d{font-size:11px;color:var(--txt3);margin:4px 0 0}
.dif-box{background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:6px 4px}
.dif{display:flex;align-items:center;gap:10px;padding:9px 12px}
.dif i{font-size:17px}
.dif span{font-size:12.5px;color:var(--txt2)}

.viewer-empty{border:1px dashed var(--line2);border-radius:14px;padding:48px 20px;text-align:center}
.viewer-empty i{font-size:38px;color:var(--txt4)}
.viewer-empty p{font-size:13px;color:var(--txt3);margin:14px 0 0}
.viewer-empty small{font-size:11px;color:var(--txt5);display:block;margin-top:6px}

.mat-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.mat-toolbar .name{font-size:13px;color:var(--txt2);font-weight:500;margin-right:auto;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbtn{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--accent);
  padding:6px 12px;border:1px solid rgba(74,158,255,.35);border-radius:20px;transition:.14s;white-space:nowrap}
.tbtn:hover{background:rgba(74,158,255,.12)}
.tbtn i{font-size:14px}
.tbtn.wa,.btn-ghost.wa{color:#25d366;border-color:rgba(37,211,102,.4)}
.tbtn.wa:hover,.btn-ghost.wa:hover{background:rgba(37,211,102,.12)}

.media-frame{background:#05080d;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.media-frame iframe,.media-frame video{display:block;width:100%;border:none;background:#000}
.media-frame video{max-height:62vh}
.pdf-frame{height:64vh}

.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gcell{aspect-ratio:4/3;border-radius:10px;overflow:hidden;background:var(--bg3);border:1px solid var(--line);
  cursor:pointer;position:relative}
.gcell img{width:100%;height:100%;object-fit:cover;transition:.25s}
.gcell:hover img{transform:scale(1.06)}

.map-wrap{border-radius:14px;overflow:hidden;border:1px solid var(--line);position:relative}
.map-wrap iframe{display:block;width:100%;height:300px;border:none}
.map-bar{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--bg3)}
.map-bar .ad{font-size:12px;color:var(--txt2);margin-right:auto}

.link-list{display:flex;flex-direction:column;gap:9px}
.linkrow{display:flex;align-items:center;gap:11px;padding:12px 14px;background:var(--bg3);
  border:1px solid var(--line);border-radius:12px;transition:.14s}
.linkrow:hover{border-color:var(--line2);background:var(--bg4)}
.linkrow .lr-ic{width:36px;height:36px;flex:none;border-radius:9px;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--brand,#4a9eff) 16%,transparent)}
.linkrow .lr-ic i{font-size:18px;color:var(--brand,var(--accent))}
.linkrow .lr-meta{flex:1;min-width:0}
.linkrow .lr-n{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.linkrow .lr-u{font-size:11px;color:var(--txt5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-card{border:1px solid var(--line);border-radius:14px;background:var(--bg3);padding:30px 20px;
  display:flex;flex-direction:column;align-items:center;gap:13px;text-align:center}
.link-card .ic{width:54px;height:54px;border-radius:13px;background:rgba(74,158,255,.12);
  display:flex;align-items:center;justify-content:center}
.link-card .ic i{font-size:27px;color:var(--accent)}
.link-card .t{font-size:14px;color:var(--txt);font-weight:600}
.link-card .s{font-size:11.5px;color:var(--txt4);max-width:300px;line-height:1.5}
.btn-primary{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:#0a1622;background:var(--accent);
  padding:11px 20px;border-radius:10px;font-weight:600;transition:.14s;border:none}
.btn-primary:hover{filter:brightness(1.08)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);
  padding:11px 18px;border-radius:10px;border:1px solid var(--line2);transition:.14s}
.btn-ghost:hover{background:var(--bg4)}

/* ---------- Lightbox ---------- */
#lightbox{position:fixed;inset:0;background:rgba(3,7,12,.94);z-index:200;display:none;
  align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#lightbox.show{display:flex}
#lightbox img,#lightbox video{max-width:92vw;max-height:84vh;border-radius:8px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
#lightbox .lb-close{position:absolute;top:20px;right:24px}
#lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;
  background:rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center;color:#fff}
#lightbox .lb-nav:hover{background:rgba(255,255,255,.2)}
#lbPrev{left:24px}#lbNext{right:24px}
#lightbox .lb-bar{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
#lightbox .lb-cap{position:absolute;top:22px;left:50%;transform:translateX(-50%);color:var(--txt3);font-size:12px}

/* ---------- Modal (admin) ---------- */
.overlay{position:fixed;inset:0;background:rgba(4,9,16,.72);z-index:150;display:none;
  align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(6px)}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:18px;width:100%;max-width:920px;
  max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.6)}
.modal-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal-head .ttl{font-size:16px;font-weight:600;margin:0}
.modal-head .sub{font-size:11px;color:var(--txt4);margin:2px 0 0}
.modal-head .spacer{flex:1}
.modal-body{padding:22px;overflow-y:auto}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--bg)}

/* login */
.login-box{max-width:380px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:.5px;color:var(--txt4);margin-bottom:6px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;background:var(--bg4);border:1px solid var(--line);
  border-radius:10px;padding:11px 13px;color:var(--txt);font-size:13px;outline:none;transition:.14s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field .hint{font-size:10.5px;color:var(--txt5);margin-top:5px;line-height:1.4}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.err{color:var(--danger);font-size:12px;margin:6px 0 0;min-height:16px}

/* admin list */
.admin-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.admin-list{display:flex;flex-direction:column;gap:8px}
.admin-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg3);
  border:1px solid var(--line);border-radius:12px}
.admin-item .thumb{width:40px;height:40px;border-radius:8px;background:var(--panel);overflow:hidden;flex:none;
  display:flex;align-items:center;justify-content:center}
.admin-item .thumb img{width:100%;height:100%;object-fit:cover}
.admin-item .thumb i{font-size:18px;color:#6f8aa8}
.admin-item .ai-meta{flex:1;min-width:0}
.admin-item .ai-meta .n{font-size:13px;font-weight:500;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-item .ai-meta .c{font-size:11px;color:var(--txt4);margin:2px 0 0}
.tag{font-size:9px;letter-spacing:.5px;padding:3px 8px;border-radius:5px;color:#0a1622;font-weight:600}

/* materials editor */
.mat-section{border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:8px;background:var(--bg3)}
.mat-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.mat-row{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg4);border:1px solid var(--line);border-radius:10px}
.mat-row .mi{width:30px;height:30px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;background:rgba(74,158,255,.12)}
.mat-row .mi i{font-size:15px;color:var(--accent)}
.mat-row .mm{flex:1;min-width:0}
.mat-row .mm .nn{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mat-row .mm .uu{font-size:10px;color:var(--txt5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mat-row .cat{font-size:9px;letter-spacing:.5px;color:var(--txt4);border:1px solid var(--line);padding:2px 7px;border-radius:20px}
.add-mat{display:grid;grid-template-columns:130px 1fr 1fr auto;gap:8px;margin-top:12px;align-items:end}
.add-mat .field{margin:0}
.add-mat-grid{display:grid;grid-template-columns:160px 1fr;gap:10px;margin-top:10px}
.add-mat-grid .field{margin:0}
.upload-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.up-main{background:var(--accent);color:#0a1622;font-weight:600;padding:10px 16px}
.up-or{font-size:11px;color:var(--txt5)}
.up-link{flex:1;min-width:160px;background:var(--bg4);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--txt);font-size:12px;outline:none}
.up-link:focus{border-color:var(--accent)}
.up-progress{margin-top:10px;font-size:12px;color:var(--accent);display:none;align-items:center;gap:10px}
.up-progress.show{display:flex}
.up-progress .bar{flex:1;max-width:260px;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}
.up-progress .bar i{display:block;height:100%;background:var(--accent);width:0;transition:width .2s}
.mini-btn{padding:9px 13px;border-radius:9px;font-size:12px;display:inline-flex;align-items:center;gap:6px}
.mini-btn.del{color:var(--danger)}
.mini-btn.del:hover{background:rgba(240,113,107,.1)}

.list-editor .le-row{display:flex;gap:8px;margin-bottom:8px}
.list-editor .le-row input{flex:1}

.con-list{display:flex;flex-direction:column;gap:9px}
.con-row{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg3);border:1px solid var(--line);border-radius:11px}
.con-row input[type=color]{width:40px;height:34px;flex:none;padding:0;border:1px solid var(--line);border-radius:8px;background:var(--bg4);cursor:pointer}
.con-row input[type=color]::-webkit-color-swatch-wrapper{padding:3px}
.con-row input[type=color]::-webkit-color-swatch{border:none;border-radius:5px}
.con-row input[data-con-name]{flex:1;background:var(--bg4);border:1px solid var(--line);border-radius:8px;padding:9px 11px;color:var(--txt);font-size:13px;outline:none}
.con-row input[data-con-name]:focus{border-color:var(--accent)}
.con-used{font-size:10.5px;color:var(--txt4);white-space:nowrap}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--bg4);border:1px solid var(--line2);color:var(--txt);padding:12px 20px;border-radius:12px;
  font-size:13px;z-index:300;transition:.25s;display:flex;align-items:center;gap:9px;box-shadow:0 16px 40px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast i{font-size:17px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============================================================
   GitHub -> jsDelivr (faz PDF/vídeo abrir embutido + CORS ok)
   ============================================================ */
function toCdn(url){
  if(!url) return url;
  url = url.trim();
  // github.com/user/repo/blob/branch/path  -> cdn.jsdelivr.net/gh/user/repo@branch/path
  let m = url.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)$/i);
  if(m) return `https://cdn.jsdelivr.net/gh/${m[1]}/${m[2]}@${m[3]}/${m[4]}`;
  // raw.githubusercontent.com/user/repo/branch/path
  m = url.match(/^https?:\/\/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+)$/i);
  if(m) return `https://cdn.jsdelivr.net/gh/${m[1]}/${m[2]}@${m[3]}/${m[4]}`;
  // Dropbox -> host de conteúdo bruto (abre embutido E baixa, com CORS)
  if(/^https?:\/\/(www\.)?dropbox\.com\//i.test(url)){
    return url.replace(/^https?:\/\/(www\.)?dropbox\.com\//i, "https://dl.dropboxusercontent.com/");
  }
  // Google Drive -> link de download direto
  m = url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?(?:export=\w+&)?id=)([\w-]+)/i);
  if(m) return `https://drive.google.com/uc?export=download&id=${m[1]}`;
  return url;
}

/* ============================================================
   STORE — Firebase Firestore se configurado, senão localStorage

const Store = (function(){
  const LS_KEY = "alumma.products.v3";
  let useFb = false, db = null, ready = false;
  let _seq = 0;
  function uid(prefix){ return prefix + Date.now().toString(36) + "_" + (_seq++).toString(36); }

  function hasConfig(){ return FIREBASE_CONFIG && FIREBASE_CONFIG.projectId; }

  function loadScript(src){
    return new Promise((res,rej)=>{
      const s=document.createElement("script"); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s);
    });
  }

  async function initFirebase(){
    await loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js");
    await loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js");
    await loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js");
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    useFb = true;
  }

  // Upload de arquivo pro Storage; retorna a URL de download. onProgress recebe 0-100.
  async function uploadFile(path, file, onProgress){
    if(!useFb || !firebase.storage) throw new Error("Storage indisponível (Firebase não conectado).");
    const ref = firebase.storage().ref(path);
    const task = ref.put(file);
    return new Promise((resolve, reject)=>{
      task.on("state_changed",
        s=>{ if(onProgress) onProgress(Math.round(s.bytesTransferred / s.totalBytes * 100)); },
        err=>reject(err),
        async ()=>{ try{ resolve(await task.snapshot.ref.getDownloadURL()); }catch(e){ reject(e); } }
      );
    });
  }

  async function init(){
    if(hasConfig()){
      try{ await initFirebase(); }
      catch(e){ console.warn("Firebase falhou, usando local:", e); useFb=false; }
    }
    ready = true;
    return {useFb};
  }

  // local helpers — fonte de verdade em memória, persistência best-effort
  let mem = null;
  function lsGet(){
    if(mem===null){
      try{ mem = JSON.parse(localStorage.getItem(LS_KEY)||"[]"); }
      catch(e){ mem = []; }
      if(!Array.isArray(mem)) mem = [];
    }
    return mem;
  }
  function lsSet(arr){
    mem = arr;
    try{ localStorage.setItem(LS_KEY, JSON.stringify(arr)); }
    catch(e){ console.warn("localStorage indisponível — dados mantidos só nesta sessão.", e); }
  }

  // Firestore não aceita array-dentro-de-array (tipologias): guarda como texto JSON
  function fbEncode(item){ const d={...item}; delete d.id; if(Array.isArray(d.tip)) d.tip=JSON.stringify(d.tip); return d; }
  function fbDecode(d){ const x={...d}; if(typeof x.tip==="string"){ try{ x.tip=JSON.parse(x.tip); }catch(e){ x.tip=[]; } } return x; }

  async function getAll(){
    if(useFb){
      const snap = await db.collection("imoveis").get();
      return snap.docs.map(d=>fbDecode({id:d.id, ...d.data()})).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
    }
    return lsGet().sort((a,b)=>(a.ordem||0)-(b.ordem||0));
  }
  async function save(item){
    if(useFb){
      const id = item.id || db.collection("imoveis").doc().id;
      await db.collection("imoveis").doc(id).set(fbEncode(item), {merge:true});
      return id;
    }
    const arr = lsGet();
    if(item.id){ const i=arr.findIndex(x=>x.id===item.id); if(i>=0) arr[i]=item; else arr.push(item); }
    else { item.id = uid("loc_"); arr.push(item); }
    lsSet(arr); return item.id;
  }
  async function remove(id){
    if(useFb){ await db.collection("imoveis").doc(id).delete(); return; }
    lsSet(lsGet().filter(x=>x.id!==id));
  }
  async function seedIfEmpty(seed){
    const all = await getAll();
    if(all.length) return all;
    for(const item of seed){ await save(item); }
    return getAll();
  }

  // ----- Construtoras (mesma lógica: memória + persistência best-effort) -----
  const CON_KEY = "nox.construtoras.v1";
  let conMem = null;
  function conGet(){
    if(conMem===null){ try{ conMem = JSON.parse(localStorage.getItem(CON_KEY)||"[]"); }catch(e){ conMem=[]; } if(!Array.isArray(conMem)) conMem=[]; }
    return conMem;
  }
  function conSet(arr){ conMem=arr; try{ localStorage.setItem(CON_KEY, JSON.stringify(arr)); }catch(e){ console.warn("localStorage indisponível (construtoras).", e); } }
  async function getCon(){
    if(useFb){ const s=await db.collection("construtoras").get(); return s.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>(a.ordem||0)-(b.ordem||0)); }
    return conGet().slice().sort((a,b)=>(a.ordem||0)-(b.ordem||0));
  }
  async function saveCon(item){
    if(useFb){ const id=item.id || db.collection("construtoras").doc().id; const data={...item}; delete data.id; await db.collection("construtoras").doc(id).set(data,{merge:true}); return id; }
    const arr=conGet();
    if(item.id){ const i=arr.findIndex(x=>x.id===item.id); if(i>=0) arr[i]=item; else arr.push(item); }
    else { item.id=uid("con_"); arr.push(item); }
    conSet(arr); return item.id;
  }
  async function removeCon(id){
    if(useFb){ await db.collection("construtoras").doc(id).delete(); return; }
    conSet(conGet().filter(x=>x.id!==id));
  }
  async function seedConIfEmpty(seed){
    const all=await getCon(); if(all.length) return all;
    for(const item of seed){ await saveCon(item); }
    return getCon();
  }

  return {init, getAll, save, remove, seedIfEmpty, getCon, saveCon, removeCon, seedConIfEmpty, uploadFile, get useFb(){return useFb;}, hasConfig};
})();

function toast(msg, icon="ti-check"){
  const t=$("#toast"); t.innerHTML=`<i class="ti ${icon}"></i>${esc(msg)}`; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2600);
}

function toastHold(msg, icon="ti-loader-2"){ const t=$("#toast"); t.innerHTML=`<i class="ti ${icon}"></i>${esc(msg)}`; t.classList.add("show"); clearTimeout(t._t); }
function hideToast(){ const t=$("#toast"); clearTimeout(t._t); t.classList.remove("show"); }

function copyText(text){
  const done=()=>toast("Link copiado — cole no WhatsApp","ti-copy");
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  } else fallbackCopy(text,done);
}
function fallbackCopy(text,done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.left="-9999px"; document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); done(); }catch(e){ toast("Copie o link manualmente","ti-link"); }
  document.body.removeChild(ta);
}
function waLink(text){ return "https://wa.me/?text="+enc(text); }
function fileNameFromUrl(url){
  try{ const u=new URL(url); const n=decodeURIComponent(u.pathname.split("/").pop()||""); return n||"arquivo"; }
  catch(e){ return "arquivo"; }
}

  if(asFile){
    if(navigator.canShare){
      try{
        toastHold("Preparando arquivo para o WhatsApp… aguarde");
        const r=await fetch(url);
        if(r.ok){
          const b=await r.blob();
          const f=new File([b], fileNameFromUrl(url), {type:b.type||"application/octet-stream"});
          if(navigator.canShare({files:[f]})){ hideToast(); await navigator.share({files:[f], text}); return; }
        }
      }catch(e){ /* CORS/erro → cai pro link */ }
      hideToast();
    }
    toast("Para enviar o arquivo, use pelo celular. No PC vai o link.","ti-device-mobile");
  }
  window.open(waLink(text),"_blank");
}
function waBtn(url, text, asFile){
  const tip = asFile ? "Encaminhar o arquivo pelo WhatsApp (pelo celular)" : "Encaminhar o link pelo WhatsApp";
  return `<button class="tbtn wa" title="${esc(tip)}" data-su="${esc(url)}" data-st="${esc(text)}" data-sf="${asFile?1:0}"><i class="ti ti-brand-whatsapp"></i> Encaminhar</button>`;
}

/* materials helpers */
function matsOf(p, key){ return (p.materiais||[]).filter(m=>m.cat===key); }
function hasMat(p, key){ return matsOf(p,key).length>0; }
function firstImg(p){
  const m=(p.materiais||[]).find(x=>x.cat==="imagens"||catByKey(x.cat)?.kind==="image");
  return m? toCdn(m.url):null;
}
// foto de capa escolhida no admin; se não houver, usa a 1ª imagem
function coverImg(p){
  if(p.capa && p.capa.trim()){
    const exists=(p.materiais||[]).some(m=>m.url===p.capa);
    if(exists || /^https?:/i.test(p.capa)) return toCdn(p.capa);
  }
  return firstImg(p);
}

function visibleItems(){
  const q=st.q.trim().toLowerCase();
  return st.items.map((p,idx)=>({p,idx}))
    .filter(o=> st.filter==="TODOS" || o.p.co===st.filter)
    .filter(o=>{
      if(!q) return true;
      const p=o.p; return (p.n+" "+p.cid+" "+(p.l||"")+" "+(p.co||"")).toLowerCase().includes(q);
    });
}

function activeTabs(p){
  const tabs=[{key:"resumo",tab:"Resumo",icon:"ti-list-details"}];
  CATEGORIES.forEach(c=>{ if(hasMat(p,c.key)) tabs.push({key:c.key,tab:c.tab,icon:c.icon,count:matsOf(p,c.key).length}); });
  tabs.push({key:"calculadora",tab:"Calculadora",icon:"ti-calculator"});
  tabs.push({key:"local",tab:"Localização",icon:"ti-map-pin"});
  return tabs;
}

function downloadBtn(url,label){
  return `<a class="tbtn" href="${esc(url)}" target="_blank" rel="noopener" download><i class="ti ti-download"></i> baixar ${esc(label||"")}</a>`;
}
function fullscreenBtn(){ return `<button class="tbtn" data-fs><i class="ti ti-maximize"></i> tela cheia</button>`; }

function viewerEmpty(txt){

function renderViewer(p){
  const col=brandColor(p.co);

  if(st.tab==="resumo"){
    const tips=(p.tip||[]).map(t=>`<div class="tip"><p class="a">${esc(t[0])} <small>m²</small></p><p class="d">${esc(t[1])}</p></div>`).join("");
    const difs=(p.dif||[]).map(d=>`<div class="dif"><i class="ti ti-circle-check" style="color:${col}"></i><span>${esc(d)}</span></div>`).join("");
    const lead = p.resumo && p.resumo.trim() ? p.resumo
      : `Torre única com lazer completo, fachada premium e acabamento de alto padrão. Unidades de ${p.tip?.[0]?.[0]||"—"} a ${p.tip?.[p.tip.length-1]?.[0]||"—"} m². Entrega prevista para ${p.e}.`;
    return `<p class="lead">${esc(lead)}</p>
      ${tips?`<p class="section-label">TIPOLOGIAS</p><div class="tip-grid">${tips}</div>`:""}
      ${difs?`<p class="section-label">DIFERENCIAIS</p><div class="dif-box">${difs}</div>`:""}`;
  }

  if(st.tab==="calculadora"){
    return `<div class="link-card">
      <div class="ic"><i class="ti ti-calculator"></i></div>
      <div class="t">Calculadora de Fluxo de Pagamento</div>
      <div class="s">Ferramenta em desenvolvimento. Em breve o corretor poderá simular aqui o fluxo de pagamento do empreendimento — entrada, parcelas, balões e financiamento — direto na apresentação.</div>
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--accent);border:1px solid rgba(154,108,240,.4);padding:7px 15px;border-radius:20px"><i class="ti ti-clock"></i> Em breve</span>
    </div>`;
  }

  if(st.tab==="local"){
    const q=enc(`${p.end}, ${p.cid}`);
    const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${q}`;
    const waText=`📍 ${p.n} — ${p.cid}\n${p.end}\nLocalização: ${mapsUrl}`;
    return `<div class="map-wrap">
      <iframe loading="lazy" src="https://www.google.com/maps?q=${q}&output=embed" title="Mapa"></iframe>
      <div class="map-bar"><i class="ti ti-map-pin-filled" style="font-size:18px;color:${col}"></i>
        <span class="ad">${esc(p.cid)} · ${esc(p.end)}</span>
        <button class="tbtn" data-copy="${esc(mapsUrl)}"><i class="ti ti-copy"></i> copiar link</button>
        <a class="tbtn" data-wa="${esc(waText)}" target="_blank" rel="noopener" href="${esc(waLink(waText))}"><i class="ti ti-brand-whatsapp"></i> WhatsApp</a>
        <a class="tbtn" target="_blank" rel="noopener" href="${esc(mapsUrl)}"><i class="ti ti-external-link"></i> abrir no Maps</a></div></div>`;
  }

  const cat=catByKey(st.tab);
  if(!cat) return viewerEmpty("Conteúdo indisponível.");
  const mats=matsOf(p,st.tab);
  if(!mats.length) return viewerEmpty(`Nenhum material em "${cat.tab}".`);

  // PDF
  if(cat.kind==="pdf"){
    const m=mats[0], url=toCdn(m.url);
    const text=`${p.n} — ${m.name||cat.tab}\n${url}`;
    return `<div class="mat-toolbar"><span class="name">${esc(m.name||cat.tab)}</span>
        <a class="tbtn" data-fs-link href="${esc(url)}" target="_blank" rel="noopener"><i class="ti ti-maximize"></i> tela cheia</a>
        ${waBtn(url,text,true)}${downloadBtn(url,"")}</div>
      <div class="media-frame"><iframe class="pdf-frame" src="${esc(url)}#view=FitH" title="${esc(m.name||"PDF")}"></iframe></div>`;
  }
  // VIDEO
  if(cat.kind==="video"){
    const m=mats[0], url=toCdn(m.url);
    const yt=ytId(m.url);
    // arquivo baixável: o link de download (.mp4) ou o próprio mp4
    const fileUrl = m.dl && m.dl.trim() ? toCdn(m.dl) : (yt ? null : url);
    const dlBtn = fileUrl ? downloadBtn(fileUrl,"vídeo") : "";
    // Encaminhar: se há arquivo, manda o ARQUIVO; senão (só YouTube) manda o link do vídeo
    const fwdBtn = fileUrl
      ? waBtn(fileUrl, `${p.n} — ${m.name||cat.tab}`, true)
      : waBtn("https://youtu.be/"+yt, `${p.n} — ${m.name||cat.tab}\nhttps://youtu.be/${yt}`, false);
    if(yt){
      return `<div class="mat-toolbar"><span class="name">${esc(m.name||cat.tab)}</span>${fwdBtn}${dlBtn}
        <a class="tbtn" href="https://youtu.be/${yt}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i> tela cheia</a></div>
        <div class="media-frame"><iframe style="height:62vh" src="https://www.youtube-nocookie.com/embed/${yt}?rel=0&modestbranding=1&playsinline=1&color=white&iv_load_policy=3" allow="autoplay; fullscreen; encrypted-media" allowfullscreen title="Vídeo"></iframe></div>`;
    }
    let extra="";
    if(mats.length>1) extra=`<div class="gallery" style="margin-top:12px">`+mats.slice(1).map((x,k)=>`<div class="gcell" data-vid="${esc(toCdn(x.url))}"><video src="${esc(toCdn(x.url))}#t=0.5" muted preload="metadata" style="width:100%;height:100%;object-fit:cover"></video></div>`).join("")+`</div>`;
    return `<div class="mat-toolbar"><span class="name">${esc(m.name||cat.tab)}</span>${fwdBtn}${dlBtn}</div>
      <div class="media-frame"><video src="${esc(url)}" controls playsinline preload="metadata"></video></div>${extra}`;
  }
  // IMAGES / PLANTAS
  if(cat.kind==="image"){
    const cells=mats.map((m,k)=>{
      const u=toCdn(m.url);
      return `<div class="gcell" data-img="${k}"><img src="${esc(u)}" alt="${esc(m.name||"")}" loading="lazy" onerror="this.parentNode.style.opacity=.4"></div>`;
    }).join("");
    return `<div class="mat-toolbar"><span class="name">${esc(cat.tab)} · ${mats.length} ${mats.length===1?"item":"itens"}</span>
        <span style="font-size:11px;color:var(--txt5)"><i class="ti ti-hand-finger" style="font-size:13px;vertical-align:-2px"></i> toque para ampliar, baixar ou encaminhar</span></div>
      <div class="gallery">${cells}</div>`;
  }
  // LINK (tabela) — sempre abre em nova aba
  if(cat.kind==="link"){
    const m=mats[0], url=m.url.trim(), text=`${p.n} — ${m.name||cat.tab}\n${url}`;
    return `<div class="link-card"><div class="ic"><i class="ti ${cat.icon}"></i></div>
      <div class="t">${esc(m.name||cat.tab)}</div>
      <div class="s">Abre em nova aba para você apresentar valores e disponibilidade.</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <a class="btn-primary" href="${esc(url)}" target="_blank" rel="noopener">abrir ${esc(cat.tab.toLowerCase())} <i class="ti ti-external-link"></i></a>
        <button class="btn-ghost wa" data-su="${esc(url)}" data-st="${esc(text)}" data-sf="0"><i class="ti ti-brand-whatsapp"></i> WhatsApp</button>
        <button class="btn-ghost" data-copy="${esc(url)}"><i class="ti ti-copy"></i> copiar link</button></div></div>`;
  }
  // LISTA DE LINKS
  if(cat.kind==="linklist"){
    const rows=mats.map(m=>{
      const url=m.url.trim(), waText=`${p.n} — ${m.name||"link"}\n${url}`;
      return `<div class="linkrow">
        <div class="lr-ic"><i class="ti ti-link"></i></div>
        <div class="lr-meta"><div class="lr-n">${esc(m.name||url)}</div><div class="lr-u">${esc(url)}</div></div>
        <button class="tbtn" data-copy="${esc(url)}"><i class="ti ti-copy"></i></button>
        <a class="tbtn" target="_blank" rel="noopener" href="${esc(waLink(waText))}"><i class="ti ti-brand-whatsapp"></i></a>
        <a class="tbtn" target="_blank" rel="noopener" href="${esc(url)}"><i class="ti ti-external-link"></i> abrir</a>
      </div>`;
    }).join("");
    return `<div class="mat-toolbar"><span class="name">${esc(cat.tab)} · ${mats.length} ${mats.length===1?"link":"links"}</span></div>
      <div class="link-list">${rows}</div>`;
  }
  return viewerEmpty("Conteúdo indisponível.");
}

function ytId(url){
  const m=String(url).match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
  return m?m[1]:null;
}

function setTab(key){
  st.tab=key;
  const p=st.items[st.i];
  main.querySelectorAll("[data-tab]").forEach(el=>el.classList.toggle("on", el.getAttribute("data-tab")===key));
  const v=$("#viewer");
  v.innerHTML=renderViewer(p);
  v.classList.remove("vfade"); void v.offsetWidth; v.classList.add("vfade");
  bindViewer(p);
}


function bindViewer(p){
  const v=$("#viewer"); if(!v) return;
  // image gallery -> lightbox
  const cat=catByKey(st.tab);
  if(cat && cat.kind==="image"){
    const mats=matsOf(p,st.tab).map(m=>({type:"image",url:toCdn(m.url),name:p.n+(m.name?" — "+m.name:"")}));
    v.querySelectorAll("[data-img]").forEach(el=>el.addEventListener("click",()=>openLightbox(mats,+el.getAttribute("data-img"))));
  }
  // extra videos -> open in lightbox
  v.querySelectorAll("[data-vid]").forEach(el=>el.addEventListener("click",()=>openLightbox([{type:"video",url:el.getAttribute("data-vid"),name:p.n}],0)));
  // copiar link
  v.querySelectorAll("[data-copy]").forEach(el=>el.addEventListener("click",e=>{ e.preventDefault(); copyText(el.getAttribute("data-copy")); }));
  // encaminhar no WhatsApp (arquivo no celular, link no PC)
  v.querySelectorAll("[data-su]").forEach(el=>el.addEventListener("click",e=>{ e.preventDefault(); doShare(el.getAttribute("data-su"), el.getAttribute("data-st"), el.getAttribute("data-sf")==="1"); }));
  // pdf fullscreen handled by link (new tab)
}

   LIGHTBOX
   ============================================================ */
function openLightbox(list, idx){
  st.lb={list, idx};
  renderLightbox(); $("#lightbox").classList.add("show");
}
function renderLightbox(){
  const {list,idx}=st.lb; if(!list.length) return;
  const m=list[idx], stage=$("#lbStage");
  stage.innerHTML = m.type==="video"
    ? `<video src="${esc(m.url)}" controls autoplay playsinline></video>`
    : `<img src="${esc(m.url)}" alt="${esc(m.name||"")}">`;
  $("#lbCap").textContent = (m.name||"") + (list.length>1?`  ·  ${idx+1}/${list.length}`:"");
  $("#lbDownload").href=m.url;
  $("#lbPrev").style.display=$("#lbNext").style.display=list.length>1?"flex":"none";
}
function lbMove(d){ const n=st.lb.list.length; st.lb.idx=(st.lb.idx+d+n)%n; renderLightbox(); }
function closeLightbox(){ $("#lightbox").classList.remove("show"); $("#lbStage").innerHTML=""; }
$("#lbShare").addEventListener("click",()=>{
  const m=st.lb.list[st.lb.idx]; if(!m) return;
  const text=`${m.name||""}\n${m.url}`.trim();
  doShare(m.url, text, m.type==="image");
});
$("#lbClose").addEventListener("click",closeLightbox);
$("#lbPrev").addEventListener("click",()=>lbMove(-1));
$("#lbNext").addEventListener("click",()=>lbMove(1));
$("#lightbox").addEventListener("click",e=>{ if(e.target.id==="lightbox") closeLightbox(); });
document.addEventListener("keydown",e=>{
  if(!$("#lightbox").classList.contains("show")) return;
  if(e.key==="Escape") closeLightbox();
  if(e.key==="ArrowLeft") lbMove(-1);
  if(e.key==="ArrowRight") lbMove(1);
});

let conDraft=null;
function openConManager(){
  conDraft = st.construtoras.map(c=>({...c}));

function renderConManager(){

    const used = st.items.filter(p=>p.co===c.name).length;
    return `<div class="con-row">
      <input type="color" data-con-color="${i}" value="${esc(c.color||'#9a6cf0')}" title="Cor da construtora">
      <input data-con-name="${i}" value="${esc(c.name)}" placeholder="Nome da construtora">
      <span class="con-used">${used} ${used===1?'imóvel':'imóveis'}</span>
      <button class="mini-btn del" data-con-del="${i}" title="Excluir"><i class="ti ti-trash"></i></button>
    </div>`;
  }).join("") || `<p style="color:var(--txt4);text-align:center;padding:20px">Nenhuma construtora. Adicione abaixo.</p>`;

  modal.innerHTML=`
    <div class="modal-head"><button class="icon-btn" id="conBack"><i class="ti ti-arrow-left"></i></button>
      <div><p class="ttl">Construtoras</p><p class="sub">Nome e cor de cada construtora · a cor aparece no app</p></div>
      <div class="spacer"></div><button class="icon-btn" data-close><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="config-note" style="margin-bottom:14px">A <b>cor</b> escolhida aparece no nome da construtora, no destaque do imóvel e nos filtros. Renomear aqui <b>atualiza automaticamente</b> os imóveis que usam essa construtora.</div>
      <div class="con-list" id="conList">${rows}</div>
      <button class="mini-btn" id="conAdd" style="margin-top:12px"><i class="ti ti-plus"></i> Nova construtora</button>
      <p class="err" id="conErr"></p>
    </div>
    <div class="modal-foot"><button class="btn-ghost" id="conBack2">Voltar</button><button class="btn-primary" id="conSave"><i class="ti ti-device-floppy"></i> Salvar construtoras</button></div>`;

  modal.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click",closeOverlay));
  $("#conBack").addEventListener("click",openAdminList);
  $("#conBack2").addEventListener("click",openAdminList);
  $("#conAdd").addEventListener("click",()=>{ syncConDraft(); conDraft.push({name:"",color:"#9a6cf0",ordem:conDraft.length}); renderConManager(); });
  modal.querySelectorAll("[data-con-del]").forEach(b=>b.addEventListener("click",()=>{
    const i=+b.getAttribute("data-con-del"), c=conDraft[i];
    const used=st.items.filter(p=>p.co===c.name).length;
    if(used && !confirm(`"${c.name}" tem ${used} imóvel(is). Excluir mesmo assim? Os imóveis ficam sem cor de construtora.`)) return;
    syncConDraft(); conDraft.splice(i,1); renderConManager();
  }));
  $("#conSave").addEventListener("click",saveConstrutoras);
}
function syncConDraft(){
  modal.querySelectorAll("[data-con-name]").forEach(el=>{ const i=+el.getAttribute("data-con-name"); if(conDraft[i]) conDraft[i].name=el.value.trim(); });
  modal.querySelectorAll("[data-con-color]").forEach(el=>{ const i=+el.getAttribute("data-con-color"); if(conDraft[i]) conDraft[i].color=el.value; });
}
async function saveConstrutoras(){
  syncConDraft();
  const names=conDraft.map(c=>c.name.trim());
  if(names.some(n=>!n)){ $("#conErr").textContent="Toda construtora precisa de um nome."; return; }
  const upper=names.map(n=>n.toUpperCase());
  if(new Set(upper).size!==upper.length){ $("#conErr").textContent="Há construtoras com nomes repetidos."; return; }
  const btn=$("#conSave"); btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Salvando...';
  try{
    // renomear em cascata nos imóveis (compara pelo id com o estado atual)
    for(const c of conDraft){
      if(!c.id) continue;
      const orig=st.construtoras.find(o=>o.id===c.id);
      if(orig && orig.name!==c.name){
        for(const p of st.items){ if(p.co===orig.name){ p.co=c.name; await Store.save(p); } }
      }
    }
    // excluir construtoras removidas
    const keepIds=conDraft.filter(c=>c.id).map(c=>c.id);
    for(const o of st.construtoras){ if(o.id && !keepIds.includes(o.id)) await Store.removeCon(o.id); }
    // salvar (cria/atualiza) com ordem
    for(let i=0;i<conDraft.length;i++){ conDraft[i].ordem=i; await Store.saveCon(conDraft[i]); }
    await reloadCon(); await reload();
    renderSide(); renderMain(); openAdminList();
    toast("Construtoras salvas");
  }catch(e){ console.error(e); $("#conErr").textContent="Erro ao salvar: "+e.message; btn.disabled=false; btn.innerHTML='<i class="ti ti-device-floppy"></i> Salvar construtoras'; }
}

function syncDraft(){
  const d=formDraft; if(!$("#f_n")) return;
  d.n=$("#f_n").value.trim();
  d.co=$("#f_co").value;
  d.l=$("#f_l").value.trim(); d.st=$("#f_st").value;
  d.cid=$("#f_cid").value.trim(); d.end=$("#f_end").value.trim();
  d.pr=$("#f_pr").value.trim(); d.m2=$("#f_m2").value.trim();
  d.t=$("#f_t").value.trim(); d.a=$("#f_a").value.trim(); d.ap=$("#f_ap").value.trim(); d.e=$("#f_e").value.trim();
  d.resumo=$("#f_resumo").value;
  if($("#f_capa")) d.capa=$("#f_capa").value||"";
  d.tip=Array.from(modal.querySelectorAll("[data-tip-a]")).map(el=>{
    const i=el.getAttribute("data-tip-a"); return [el.value.trim(), (modal.querySelector(`[data-tip-d="${i}"]`)||{}).value?.trim()||""];
  }).filter(t=>t[0]||t[1]);
  d.dif=Array.from(modal.querySelectorAll("[data-dif]")).map(el=>el.value.trim()).filter(Boolean);
}

async function saveProduct(editing){
  syncDraft();
  const d=formDraft;
  if(!d.n){ $("#formErr").textContent="Informe o nome do empreendimento."; return; }
  if(!d.cid){ $("#formErr").textContent="Informe a cidade."; return; }
  if(!d.tip.length) d.tip=[["",""]];
  const btn=$("#saveProd"); btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Salvando...';
  try{
    await Store.save(d);
    await reload();
    // selecionar o imóvel salvo
    const idx=st.items.findIndex(x=>x.n===d.n && x.cid===d.cid);
    if(idx>=0){ st.i=idx; st.tab="resumo"; }
    renderSide(); renderMain();
    openAdminList();
    toast(editing?"Imóvel atualizado":"Imóvel cadastrado");
  }catch(e){ console.error(e); $("#formErr").textContent="Erro ao salvar: "+e.message; btn.disabled=false; btn.innerHTML='<i class="ti ti-device-floppy"></i> Salvar imóvel'; }
}

/* export / import — inclui imóveis E construtoras */
function exportJSON(){
  const data=JSON.stringify({versao:1, construtoras:st.construtoras, imoveis:st.items}, null, 2);
  const blob=new Blob([data],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="nox-imoveis-catalogo.json"; a.click();
  toast("Catálogo exportado","ti-download");
}
function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const parsed=JSON.parse(r.result);
      // aceita formato novo {imoveis,construtoras} ou antigo (array de imóveis)
      const imoveis = Array.isArray(parsed) ? parsed : (parsed.imoveis||[]);
      const cons = Array.isArray(parsed) ? [] : (parsed.construtoras||[]);
      if(!imoveis.length && !cons.length) throw new Error("Arquivo sem dados reconhecíveis");
      if(!confirm(`Importar ${imoveis.length} imóveis e ${cons.length} construtoras? Serão adicionados ao catálogo atual.`)) return;
      for(const c of cons){ const ex=st.construtoras.find(x=>x.name===c.name); if(!ex){ const nc={...c}; delete nc.id; nc.ordem=st.construtoras.length; await Store.saveCon(nc); await reloadCon(); } }
      for(const it of imoveis){ const ni={...it}; delete ni.id; await Store.save(ni); }
      await reloadCon(); await reload(); renderSide(); renderMain(); openAdminList(); toast("Catálogo importado");
    }catch(err){ alert("Erro ao importar: "+err.message); }
  };
  r.readAsText(file); e.target.value="";
}

async function reload(){ st.items=await Store.getAll(); }
async function reloadCon(){
  try{ st.construtoras = await Store.getCon(); }catch(e){ st.construtoras = SEED_CON.map((c,i)=>({...c, id:"conmem_"+i})); }
  if(!Array.isArray(st.construtoras) || !st.construtoras.length){ st.construtoras = SEED_CON.map((c,i)=>({...c, id:"conmem_"+i})); }
}

async function boot(){
  try{ await Store.init(); }
  catch(e){ console.warn(e); }

  try{ st.construtoras = await Store.seedConIfEmpty(SEED_CON); }
  catch(e){ console.warn("Falha construtoras — usando padrão.", e); st.construtoras = SEED_CON.map((c,i)=>({...c, id:"conmem_"+i})); }
  if(!Array.isArray(st.construtoras) || !st.construtoras.length){ st.construtoras = SEED_CON.map((c,i)=>({...c, id:"conmem_"+i})); }

  try{
    st.items = await Store.seedIfEmpty(SEED);
  }catch(e){
    console.warn("Falha ao carregar/semear o catálogo — usando dados em memória.", e);
    st.items = SEED.map((p,i)=>({...p, id:"mem_"+i}));
  }
  if(!Array.isArray(st.items) || !st.items.length){
    st.items = SEED.map((p,i)=>({...p, id:"mem_"+i}));
  }
  renderSide(); renderMain();
}
boot().catch(e=>{
  console.error("Erro no boot — render de emergência.", e);
  st.items = SEED.map((p,i)=>({...p, id:"mem_"+i}));
  if(!st.construtoras.length) st.construtoras = SEED_CON.map((c,i)=>({...c, id:"conmem_"+i}));
  try{ renderSide(); renderMain(); }catch(_){}
});

})();
</script>
</body>
</html>
